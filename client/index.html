    <title>Smart Queue</title>
    <style>
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        background: #050505; color: #fff;
        font-family: system-ui, -apple-system, sans-serif;
        transition: opacity 0.5s ease, visibility 0.5s ease;
      }
      #splash.hide {
        opacity: 0; visibility: hidden; pointer-events: none;
      }
      #splash-logo {
        width: 80px; height: 80px; border-radius: 20px;
        background: linear-gradient(135deg, #FF7A00, #FFB347);
        display: flex; align-items: center; justify-content: center;
        font-size: 40px; font-weight: 800; color: #fff;
        box-shadow: 0 0 40px rgba(255,122,0,0.3);
        animation: splashPulse 1.5s ease-in-out infinite;
      }
      #splash-name {
        margin-top: 20px; font-size: 20px; font-weight: 700;
        letter-spacing: -0.02em;
      }
      #splash-spinner {
        margin-top: 32px; width: 24px; height: 24px;
        border: 2px solid rgba(255,255,255,0.1);
        border-top-color: #FF7A00;
        border-radius: 50%; animation: spin 0.8s linear infinite;
      }
      @keyframes splashPulse {
        0%, 100% { transform: scale(1); }
        50% { transform: scale(1.05); }
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>

    <div id="root">

        <div id="splash-spinner"></div>
      </div>
    </div>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => document.getElementById('splash')?.classList.add('hide'), 4000)
      })
